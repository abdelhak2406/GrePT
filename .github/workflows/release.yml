name: Release Extension
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Install Zip utility
        run: apt-get update && apt-get install -y zip

      - name: Zip the output
        run: zip -r grept-${{ github.ref_name }}.zip dist/

      - name: Create release and upload asset
        run: gh release create ${{ github.ref_name }} grept-${{ github.ref_name }}.zip --notes "See README for installation instructions."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
